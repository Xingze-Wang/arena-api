name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Fly.io
    runs-on: ubuntu-latest
    concurrency: deploy-group
    steps:
      # Guard: secrets can't be used in job-level `if`, so short-circuit here.
      # Job stays green until FLY_API_TOKEN is added (Settings → Secrets → Actions).
      - name: Check for deploy token
        id: guard
        env:
          TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          if [ -n "$TOKEN" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "No FLY_API_TOKEN set — skipping deploy. Add it in repo Secrets to enable."
          fi
      - uses: actions/checkout@v4
        if: steps.guard.outputs.ready == 'true'
      - uses: superfly/flyctl-actions/setup-flyctl@master
        if: steps.guard.outputs.ready == 'true'
      - name: Deploy
        if: steps.guard.outputs.ready == 'true'
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
